name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 21 * * *'       # Runs daily at 21:00 UTC = 05:00 CST+1
      timezone: 'Asia/Shanghai'
  workflow_dispatch:            # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Map secret to env so `if` conditions can check it safely
      HAS_FEISHU: ${{ secrets.FEISHU_APP_ID != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run horizon --hours 48

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      # ============================================================
      # Deploy to GitHub Pages (existing — unchanged)
      # ============================================================
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true

      # ============================================================
      # Deliver to Feishu (skips if FEISHU_APP_ID secret not set)
      # ============================================================
      - name: Set up Node.js (for lark-cli)
        if: env.HAS_FEISHU == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install lark-cli
        if: env.HAS_FEISHU == 'true'
        run: npm install -g @larksuite/cli

      - name: Configure lark-cli
        if: env.HAS_FEISHU == 'true'
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          echo "🔧 Configuring lark-cli with app_id=${FEISHU_APP_ID:0:8}..."
          echo "$FEISHU_APP_SECRET" | lark-cli config init \
            --app-id "$FEISHU_APP_ID" \
            --app-secret-stdin \
            --brand feishu 2>&1
          echo "--- config init exit code: $? ---"
          echo "--- config show ---"
          lark-cli config show 2>&1 || true
          echo "--- config files ---"
          ls -la ~/.lark-cli/ 2>&1 || true

      - name: Deliver summary to Feishu
        if: env.HAS_FEISHU == 'true'
        continue-on-error: true   # Feishu failure must not break GitHub Pages deploy
        env:
          FEISHU_USER_OPEN_ID: ${{ secrets.FEISHU_USER_OPEN_ID }}
          GITHUB_PAGES_URL: https://dsongmail.github.io/Horizon
        run: |
          set +e  # disable implicit bash -e from CI runner
          SUMMARY_FILE="docs/_posts/${DATE}-summary-zh.md"

          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "::warning::Feishu delivery skipped — summary file missing"
            exit 0
          fi

          echo "📄 Summary file: $SUMMARY_FILE ($(wc -c < "$SUMMARY_FILE") bytes)"

          # 1. Create Feishu doc (prep # Title via stdin to avoid "Untitled")
          echo "📝 Creating Feishu doc..."
          (echo "# Horizon Summary: ${DATE} (ZH)"; echo ""; cat "$SUMMARY_FILE") | \
            lark-cli docs +create --api-version v2 --doc-format markdown --as bot --content - > /tmp/doc_result.json 2>&1
          DOC_EXIT=$?

          cat /tmp/doc_result.json

          DOC_URL=$(sed -n 's/.*"url": *"\([^"]*\)".*/\1/p' /tmp/doc_result.json | head -1)

          if [ "$DOC_EXIT" -ne 0 ] || [ -z "$DOC_URL" ]; then
            echo "::warning::Feishu doc creation failed (exit=$DOC_EXIT, url=$DOC_URL)"
            exit 0
          fi

          echo "✅ Feishu doc created: $DOC_URL"

          # 2. Send Feishu message (single line, no backslash continuation)
          echo "📨 Sending Feishu message..."
          lark-cli im +messages-send --as bot --user-id "${FEISHU_USER_OPEN_ID}" --text "🌅 Horizon 每日简报已生成 (${DATE}) | 📖 飞书文档: ${DOC_URL} | 🌐 GitHub Pages: ${GITHUB_PAGES_URL}" > /tmp/msg_result.json 2>&1
          MSG_EXIT=$?

          cat /tmp/msg_result.json

          if [ "$MSG_EXIT" -eq 0 ]; then
            echo "✅ Feishu message sent"
          else
            echo "::warning::Feishu message send failed (exit code: $MSG_EXIT)"
          fi
